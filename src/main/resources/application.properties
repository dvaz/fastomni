# =========================
# MONGO
# =========================
spring.data.mongodb.uri=mongodb://localhost:27017/orderdb

# app mongo tuning
app.mongo.database=orderdb
app.mongo.collection=orders
app.mongo.max-pool-size=120
app.mongo.min-pool-size=20
app.mongo.max-connecting=12
app.mongo.connect-timeout-ms=3000
app.mongo.read-timeout-ms=15000
app.mongo.server-selection-timeout-ms=3000

# =========================
# APP BATCHING
# =========================
app.insert.batch-size=1000
app.insert.parallelism=8